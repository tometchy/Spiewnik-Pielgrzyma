<h1 id="song869">IX. Prowadź, prowadź mnie Sam</h1>

<p>
<b>Zwrotka 1</b><br> Prowadź, prowadź mnie Sam,<br> Prowadź do Niebios bram.<br> Przez życie me, ach proszę Cię,<br> Mój drogi Zbawco - poprowadź mnie!<br>
<b>Zwrotka 2</b><br> Prowadź, Sam prowadź mnie.<br> Prowadź, jak dziecię Swe;<br> Za rękę weź i ciągle wiedź -<br> Proszę Cię, Jezu, zawsze mnie wiedź.<br> </p>
