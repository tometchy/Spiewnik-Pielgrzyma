<h1>IX. Prowadź, prowadź mnie Sam</h1>

<p>Zwrotka 1<br><br> Prowadź, prowadź mnie Sam,<br> Prowadź do Niebios bram.<br> Przez życie me, ach proszę Cię,<br> Mój drogi Zbawco - poprowadź mnie!<br><br><br>Zwrotka 2<br><br> Prowadź, Sam prowadź mnie.<br> Prowadź, jak dziecię Swe;<br> Za rękę weź i ciągle wiedź -<br> Proszę Cię, Jezu, zawsze mnie wiedź.</p>
