<h1>743. Byłem zmazany przez świat i przez grzech</h1>

<p>Zwrotka 1<br><br> Byłem zmazany przez świat i przez grzech,<br> Lecz Jezus ujrzał mię,<br> Rękę wyciągnął — tak, dźwignął mię wzwyż,<br> Golgoty sławny Krzyż.<br> / Golgoty sławny Krzyż /x2<br> Tak — spłacił dług mój<br> i wolność mi dał<br> Golgoty sławny Krzyż!</p>
