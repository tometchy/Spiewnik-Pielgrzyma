<h1>812. Łaska naszego Chrystusa i Pana</h1>

<p>Zwrotka 1<br><br> Łaska naszego Chrystusa i Pana,<br> I miłość Boża wraz ze społecznością<br> Ducha Świętego,<br> Niechaj będzie z nami,<br> Z nami wszystkimi.<br> Amen, amen, amen.</p>
